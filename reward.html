<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRYA रिवॉर्ड प्रोग्राम</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .container { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 15px; background-color: #25D366; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎁 KRYA रिवॉर्ड प्रोग्राम</h2>
    <p>अपना विवरण भरें और व्हाट्सएप पर भेजें:</p>
    
    <input type="text" id="name" placeholder="आपका नाम">
    <input type="text" id="orderId" placeholder="अमेज़न ऑर्डर आईडी">
    <select id="activity" style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;">
        <option value="प्रोडक्ट शेयर किया">प्रोडक्ट शेयर किया</option>
        <option value="अमेज़न से खरीदारी की">अमेज़न से खरीदारी की</option>
    </select>

    <button class="btn" onclick="sendWhatsApp()">व्हाट्सएप पर भेजें</button>
</div>

<script>
    function sendWhatsApp() {
        var name = document.getElementById("name").value;
        var orderId = document.getElementById("orderId").value;
        var activity = document.getElementById("activity").value;
        var phone = "916379403821";
        
        var message = "नमस्ते मुकेश जी, मेरा नाम " + name + " है। मैंने " + activity + " की है। मेरी ऑर्डर आईडी: " + orderId + " है।";
        var url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
        
        window.open(url, '_blank');
    }
</script>

</body>
</html>
