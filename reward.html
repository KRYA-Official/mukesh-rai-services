<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>KRYA लकी ड्रा | अपना टिकट प्राप्त करें</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #004d40; color: #fff; text-align: center; padding: 20px; }
        .lottery-card { max-width: 450px; margin: auto; background: #fff; color: #333; padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(255,215,0,0.5); border: 5px solid #ffd700; }
        .ticket-num { font-size: 40px; font-weight: bold; color: #2e7d32; margin: 20px 0; padding: 15px; border: 2px dashed #2e7d32; border-radius: 10px; }
        .timer { font-size: 18px; color: #d32f2f; font-weight: bold; margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 18px; background: #2e7d32; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="lottery-card">
    <h2 style="color: #2e7d32;">KRYA लकी ड्रा</h2>
    <div class="timer" id="timer">अगला ड्रा: 30 दिन में</div>
    <p>आपका यूनिक टिकट नंबर:</p>
    <div class="ticket-num" id="ticketNumber">---</div>
    <p>इसे व्हाट्सएप पर भेजें और अपनी एंट्री पक्की करें!</p>
    <button class="btn" onclick="shareTicket()">व्हाट्सएप पर सेंड करें</button>
</div>

<script>
    function generateTicket() {
        var randomNum = Math.floor(100000 + Math.random() * 900000);
        document.getElementById("ticketNumber").innerText = "KRYA-" + randomNum;
    }
    function shareTicket() {
        var ticket = document.getElementById("ticketNumber").innerText;
        var phone = "916379403821";
        var url = "https://wa.me/" + phone + "?text=नमस्ते, मेरा KRYA लकी ड्रा टिकट नंबर " + ticket + " है। कृपया इसे रजिस्टर करें।";
        window.open(url, '_blank');
    }
    window.onload = generateTicket;
</script>
</body>
</html>
